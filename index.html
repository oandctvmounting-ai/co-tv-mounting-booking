const TV = {
    mount:   { fixed: 30, tilt: 40, full: 60 },
    size:    { s55: 90, s56: 95, s66: 100, s76: 115, s86: 135, s96: 170 },

/* Mount type display titles + example illustrations (inline SVG, on-brand).
   To use real photos instead, set MOUNT_PHOTO[k] = 'https://...jpg' and
   change the .mount-card markup in mountCards() to <img src="${MOUNT_PHOTO[k]}">. */
const MOUNT_TITLE = { fixed: 'Fixed Mount', tilt: 'Tilt Mount', full: 'Full Motion Mount' };
const MOUNT_SVG = {
    fixed: `<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg" aria-label="Fixed mount">
        <rect width="200" height="150" fill="#F9F4E8"/>
        <rect x="16" y="22" width="12" height="106" rx="2" fill="#002366"/>
        <rect x="30" y="44" width="140" height="72" rx="6" fill="#1A1A1A" stroke="#D4AF37" stroke-width="2"/>
        <rect x="46" y="58" width="108" height="44" rx="3" fill="#0d274d"/>
        <rect x="28" y="78" width="6" height="6" fill="#D4AF37"/>
    </svg>`,

/* helper: radio-style option cards */
function optCard(group, label, options) {
    // options: [[value, display], ...]  — value is the stored key, display is shown text
    return `<label>${label}</label>` +
        options.map(([val, disp]) => {
            const show = disp || val;
            const tag = (typeof disp === 'string' && disp.includes('$')) ? show : '';
            const text = (typeof disp === 'string' && disp.includes('$')) ? show.replace(/\s*\(\+\$\d+\)/, '') : show;
            return `<div class="option-card" data-group="${group}" onclick="pickOption('${group}','${val}', this)"><span>${text}</span><span class="price-tag">${tag}</span></div>`;
        }).join('');
}
function toggleCard(id, label, disp) {

}

/* ---------- Setters ---------- */
function pickOption(group, val, el) {
    // group format: prefix + '_mount_' + i  OR  prefix + '_surface_' + i
    const parts = group.split('_');
    const field = parts[parts.length - 2]; // 'mount' or 'surface'
    const i = parseInt(parts[parts.length - 1], 10);
    const tv = state.tvs[i];
    if (tv) {
        tv[field] = val;
        console.log(`pickOption: group=${group}, field=${field}, val=${val}, TV[${i}].${field}=${tv[field]}`);
    }
    document.querySelectorAll(`.option-card[data-group="${group}"]`).forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    calculateTotal();
}
function toggleFireplace(prefix, i) {
    const tv = state.tvs[i]; if (!tv) return;
    tv.overFireplace = !tv.overFireplace;
    document.getElementById(prefix + '_fw_' + i).classList.toggle('selected', tv.overFireplace);
    calculateTotal();
}
function setTv(prefix, i, field, val) {
    const tv = state.tvs[i]; if (!tv) return;
    if (field === 'size') tv.size = val;
    if (field === 'wire') tv.wire = (tv.wire === val) ? null : val;
    if (field === 'wire') {
        document.getElementById(prefix + '_wire_internal_' + i).classList.toggle('selected', tv.wire === 'internal');
        document.getElementById(prefix + '_wire_external_' + i).classList.toggle('selected', tv.wire === 'external');

    calculateTotal();
}

    if (field === 'qty')  state.blinds.qty = parseInt(val) || 1;

function setMirrors(field, val) {

}
function setLed(choice) {

function toggleAddon(key) {

/* ---------- Pricing engine ---------- */
function tvUnitTotal(tv) {
    let t = 0;
    if (tv.mount)   t += TV.mount[tv.mount] || 0;
    if (tv.size)    t += TV.size[tv.size] || 0;
    if (tv.surface) t += TV.surface[tv.surface] || 0;
    if (tv.overFireplace) t += TV.fireplaceSurcharge;
    // Large-TV surcharge applies to 85" and up → size keys s86 and s96
    if (tv.size && (tv.size === 's86' || tv.size === 's96')) t += TV.largeTvSurcharge;
    if (tv.wire)    t += TV.wire[tv.wire] || 0;
    return t;
}
function tvTotal() {
    return state.tvs.reduce((sum, tv) => sum + tvUnitTotal(tv), 0);
}
function getInstantRange() {
    let min = 0, max = 0;
    const active = new Set([state.primary, ...state.addons]);
    
    // Base services
    if (active.has('tv')) {
        state.tvs.forEach(tv => {
            min += tvUnitTotal(tv);
            max += tvUnitTotal(tv) + 30; // +$30 range for unselected options
        });
    }
    if (active.has('blinds') && state.blinds.size) {
        const cost = BLINDS[state.blinds.size] * (state.blinds.qty || 1);
        min += cost; max += cost + 10;
    }
    if (active.has('mirrors') && state.mirrors.size) {
        const cost = MIRRORS[state.mirrors.size] * (state.mirrors.qty || 1);
        min += cost; max += cost + 5;
    }
    if (active.has('soundbar')) {
        const cost = SOUNDBAR * (state.soundbar.qty || 1);
        min += cost; max += cost + 10;
    }
    if (active.has('fireplace')) { min += FIREPLACE; max += FIREPLACE + 25; }
    if (active.has('led') && state.ledChoice) {
        const cost = LED[state.ledChoice];
        min += cost; max += cost + 15;
    }
    // Travel fee boundary
    if (state.travelDistance !== null) {
        if (state.travelDistance > 20) min += 25;
        if (state.travelDistance > 25) max += 25; // deposit might apply
    }
    // Promo discount (already applied in calculateTotal)
    if (state.appliedPromo) {
        const base = min;
        const disc = state.appliedPromo.type === 'percent' 
            ? Math.round(base * state.appliedPromo.value / 100) 
            : Math.min(state.appliedPromo.value, base);
        min = Math.max(0, min - disc);
        max = Math.max(0, max - disc);
    }
    return { min, max };
}
function calculateTotal() {
    let total = 0;
    // Travel fee: $25 if distance > 20 miles from Irving
    if (state.travelDistance !== null && state.travelDistance > 20) {
        total += 25;
    }
    const active = new Set([state.primary, ...state.addons]);

    if (active.has('tv'))       total += tvTotal();
    if (active.has('blinds') && state.blinds.size)   total += BLINDS[state.blinds.size] * (state.blinds.qty || 1);
    if (active.has('mirrors') && state.mirrors.size) total += MIRRORS[state.mirrors.size] * (state.mirrors.qty || 1);
    if (active.has('soundbar')) total += SOUNDBAR * (state.soundbar.qty || 1);
    if (active.has('fireplace')) total += FIREPLACE;
    if (active.has('led') && state.ledChoice) total += LED[state.ledChoice];

    // Apply promo discount
    let discount = 0;
    const p = state.appliedPromo;
    if (p) {
        discount = (p.type === 'percent') ? Math.round(total * p.value / 100) : Math.min(p.value, total);
        total = Math.max(0, total - discount);
    }

    const disp = document.getElementById('display-total');
    if (disp) {
        // Show instant range if we have selections
        const range = getInstantRange();
        if (range.min > 0 || range.max > 0) {
            disp.innerHTML = '$' + range.min + ' – $' + range.max;
            const note = document.getElementById('instant-note');
            if (note) note.style.display = 'inline';
        } else {
            disp.innerText = '$0';
        }
        const pa = document.getElementById('promo-applied');
        if (pa) pa.innerText = p ? `Saved $${discount} (${p.code})` : '';
    }
    return total;
}

function applyPromo() {
    const raw = (state.promoInput || '').toUpperCase().trim();
    console.log('Promo input raw:', raw);
    const msg = document.getElementById('promo-msg');
    if (!raw) { 
        msg.style.color = 'var(--text-muted)'; 
        msg.innerText = 'Enter a code first.'; 
        return; 
    }
    const now = new Date();
    const found = PROMOS.find(x => x.code.toUpperCase() === raw);
    console.log('Found promo:', found);
    if (!found) {
        state.appliedPromo = null;
        msg.style.color = '#b71c1c'; 
        msg.innerText = 'Invalid promo code.';
    } else if (!found.active) {
        state.appliedPromo = null;
        msg.style.color = '#b71c1c'; 
        msg.innerText = `Code "${found.code}" is not active right now.`;
    } else if (found.expires && now > new Date(found.expires + 'T23:59:59')) {
        state.appliedPromo = null;
        msg.style.color = '#b71c1c'; 
        msg.innerText = `Code "${found.code}" has expired.`;
    } else {
        state.appliedPromo = found;
        msg.style.color = '#1e7e34';
        msg.innerText = `✓ ${found.code} applied — ${found.type === 'percent' ? found.value + '% off' : '$' + found.value + ' off'}!`;
    }
    console.log('After promo application, appliedPromo:', state.appliedPromo);
    calculateTotal();
}

    }

}

/* ---------- Final pricing + travel-fee note (Step 4) ---------- */
function renderFinalPricing() {
    const total = calculateTotal();
    const ft = document.getElementById('final-total');
    // On final step, show exact price (not range)
    if (ft) {
        ft.innerText = '$' + total;
        const parent = ft.parentElement;
        if (parent && parent.classList.contains('total-box')) {
            // Ensure label says "Final Estimate" not "Instant Estimate Range"
            const label = parent.querySelector('.total-label');
            if (label) label.innerText = 'Final Estimate';
        }
    }

    const note = document.getElementById('final-travel-note');
    if (note) {
        if (state.travelDistance !== null && state.travelDistance > TRAVEL_FEE_MAX_DISTANCE) {
            note.innerHTML = `<div class="total-box" style="background:var(--gold-light); color:var(--royal-blue); border-color:var(--royal-blue); text-align:left">
                <span class="total-label" style="color:var(--royal-blue)">Travel Fee Applies (${state.travelDistance.toFixed(0)} mi from Irving)</span>
                <span class="total-amount" style="color:var(--royal-blue); font-size:1.4rem">$${TRAVEL_FEE}.00</span>
                <span class="total-note" style="color:var(--royal-blue)">Included in your final price — applies to jobs beyond ${TRAVEL_FEE_MAX_DISTANCE} miles from Irving, TX</span>
            </div>`;
        } else if (state.travelDistance !== null) {
            note.innerHTML = `<div class="total-box" style="background:#e6f4ea; color:#1e7e34; border-color:#1e7e34; text-align:left">
                <span class="total-label" style="color:#1e7e34">No Travel Fee</span>
                <span class="total-amount" style="color:#1e7e34; font-size:1.4rem">Within ${TRAVEL_FEE_MAX_DISTANCE} miles</span>
                <span class="total-note" style="color:#1e7e34">No travel fee — you are ${state.travelDistance.toFixed(0)} miles from Irving, TX</span>
            </div>`;
        } else {
            note.innerHTML = '';
        }
    }

    const fp = document.getElementById('final-promo');
    if (fp) {
        const p = state.appliedPromo;
        fp.innerText = p ? `Promo ${p.code} applied` : '';
    }
}

/* ---------- Deposit logic (distance from Irving, TX) ---------- */
function haversine(lat1, lon1, lat2, lon2) {
    const R = 3958.8; // miles
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
async function updateTravelDistance() {
    const addr = document.getElementById('cust-address').value;
    if (!addr.trim()) {
        state.travelDistance = null;
        return;
    }
    try {
        const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(addr);
        const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
        const data = await res.json();
        if (!data || !data[0]) {
            state.travelDistance = null;
            return;
        }
        const d = haversine(IRVING.lat, IRVING.lon, parseFloat(data[0].lat), parseFloat(data[0].lon));
        state.travelDistance = d;
    } catch (e) {
        console.error('Could not geocode address for travel distance:', e);
        state.travelDistance = null;
    }
}
async function evaluateDeposit() {
    const area = document.getElementById('deposit-area');
    const addr = document.getElementById('cust-address').value;
    area.innerHTML = `<div class="total-box" style="background:var(--royal-blue)">
        <span class="total-label"><span class="spinner"></span>Checking distance from Irving…</span></div>`;
    document.getElementById('submit-btn').innerText = 'Book Now';

    try {
        const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(addr);
        const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
        const data = await res.json();
        if (!data || !data[0]) { unknownDeposit(area); return; }
        const d = haversine(IRVING.lat, IRVING.lon, parseFloat(data[0].lat), parseFloat(data[0].lon));
        state.travelDistance = d;   // keep travel-fee engine in sync with deposit geocode
        if (d > DEPOSIT_REQUIRED_MILES) {
            area.innerHTML = `<div class="total-box" style="background:var(--gold-light); color:var(--royal-blue); border-color:var(--royal-blue)">
                <span class="total-label" style="color:var(--royal-blue)">Deposit Required (${d.toFixed(0)} mi from Irving)</span>
                <span class="total-amount" style="color:var(--royal-blue)">$50.00</span>
                <span class="total-note" style="color:var(--royal-blue)">Secures your slot for jobs beyond 25 miles</span></div>`;
            document.getElementById('submit-btn').innerText = 'Book & Pay $50 Deposit';
        } else {
            area.innerHTML = `<div class="total-box" style="background:#e6f4ea; color:#1e7e34; border-color:#1e7e34">
                <span class="total-label" style="color:#1e7e34">No Deposit Required</span>
                <span class="total-amount" style="color:#1e7e34; font-size:1.4rem">Within 25 miles</span>
                <span class="total-note" style="color:#1e7e34">Just pay on completion — ${d.toFixed(0)} mi from Irving</span></div>`;
            document.getElementById('submit-btn').innerText = 'Book Now';
        }
        renderFinalPricing();   // refresh final total + travel-fee note now that distance is known
    } catch (e) {
        unknownDeposit(area);
    }
}
function unknownDeposit(area) {
    area.innerHTML = `<div class="total-box" style="background:var(--gold-light); color:var(--royal-blue); border-color:var(--royal-blue)">
        <span class="total-label" style="color:var(--royal-blue)">Deposit</span>
        <span class="total-amount" style="color:var(--royal-blue); font-size:1.3rem">Confirmed by text</span>
        <span class="total-note" style="color:var(--royal-blue)">We'll verify distance & deposit when we confirm</span></div>`;
    document.getElementById('submit-btn').innerText = 'Book Now';
}

/* ---------- Submit ---------- */
function submitBooking() {
    const total = calculateTotal();
    const needsDeposit = document.getElementById('submit-btn').innerText.includes('Deposit');
    const primary = state.primary ? (state.primary === 'led'
        ? ('LED – ' + (state.ledChoice === 'house' ? 'Inside House LEDs (lights provided)' : 'TV Lights Installation'))
        : SERVICES[state.primary].name) : '';
    const addons = [...state.addons].map(k => k === 'led'
        ? ('LED – ' + (state.ledChoice === 'house' ? 'Inside House LEDs (lights provided)' : 'TV Lights Installation'))
        : SERVICES[k].name);
    const tvDetails = state.tvs.map(tv => ({
        mount: tv.mount, sizeLabel: tv.size ? TV.sizeLabel[tv.size] : '',
        surfaceLabel: tv.surface ? TV.surfaceLabel[tv.surface] : '',
        overFireplace: tv.overFireplace, wireLabel: tv.wire ? TV.wireLabel[tv.wire] : ''
    }));
    const payload = {
        name: document.getElementById('cust-name').value,
        phone: document.getElementById('cust-phone').value,
        address: document.getElementById('cust-address').value,
        datetime: document.getElementById('booking-time').value,
        primary: primary,
        addons: addons,
        tvDetails: tvDetails,
        total: total,
        deposit: needsDeposit ? 50 : 0,
        promo: state.appliedPromo ? state.appliedPromo.code : '',
        photo: PHOTO_DATA || '',
        source: 'booking-page'
    };

    if (!APP_SCRIPT_URL) {
        queueLocal(payload);
        alert('Booking captured locally (backend not connected yet).\n\n' + summarize(payload));
        return;
    }

    // If a deposit is required, first create the Square checkout link, then redirect.
    if (needsDeposit) {
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = 'Creating secure checkout…';
        fetch(APP_SCRIPT_URL, {
            method: 'POST',
            mode: 'cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(Object.assign({ action: 'create_deposit' }, payload))
        })
        .then(r => r.json())
        .then(res => {
            if (res.ok && res.checkout_url) {
                // Also send the booking record (so it's logged even before payment),
                // carrying the same booking_ref Square will echo back in the webhook.
                fetch(APP_SCRIPT_URL, {
                    method: 'POST', mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(Object.assign({ booking_ref: res.booking_ref }, payload))
                }).catch(() => {});
                window.location.href = res.checkout_url; // -> Square hosted checkout
            } else {
                throw new Error(res.error || 'could not create checkout');
            }
        })
        .catch(err => {
            btn.disabled = false;
            btn.innerText = 'Book & Pay $50 Deposit';
            alert('Could not start payment: ' + err.message + '\nWe saved your info and will reach out.');
            queueLocal(payload);
        });
        return;
    }

    // No deposit: just submit the booking.
    fetch(APP_SCRIPT_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
    })
    .then(r => r.json())
    .then(res => {
        if (res.ok) {
            alert('✓ Booking sent! We\'ll confirm shortly.\n\n' + summarize(payload));
        } else {
            throw new Error(res.error || 'submit failed');
        }
    })
    .catch(err => {
        queueLocal(payload);
        alert('Saved locally (couldn\'t reach server). We\'ll retry sync.\n\n' + summarize(payload));
    });
}

/* Show a thank-you if Square redirected back with ?paid= */
function checkPaidRedirect() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('paid') && params.get('src') === 'square') {
        alert('✅ Deposit received! Your booking is confirmed and we\'ll be in touch shortly.');
        // clean the URL so refresh doesn't re-alert
        window.history.replaceState({}, document.title, window.location.pathname);
    }
}

function summarize(p) {
    let s = `✅ Booking Confirmed!\n\nService: ${p.primary}`;
    if (p.addons && p.addons.length) s += `\nAdd-ons: ` + p.addons.join(', ');
    s += `\nName: ${p.name}`;
    s += `\nAddress: ${p.address}`;
    if (p.datetime) s += `\nDate/Time: ${p.datetime}`;
    s += `\nEstimate: $${p.total}`;
    if (p.promo) s += `\nPromo: ${p.promo}`;
    if (p.deposit) s += `\nDeposit paid: $${p.deposit}`;
    s += `\n\nWe'll confirm shortly. Questions? Text 817-523-9753.`;
    return s;
}

function queueLocal(payload) {
    try {
        // strip the (potentially large) base64 photo to avoid blowing the 5MB localStorage quota
        const safe = Object.assign({}, payload);
        delete safe.photo;
        const q = JSON.parse(localStorage.getItem('co_pending_bookings') || '[]');
        q.push(Object.assign({ queuedAt: new Date().toISOString() }, safe));
        localStorage.setItem('co_pending_bookings', JSON.stringify(q));
    } catch (e) { /* localStorage unavailable — nothing we can do */ }
}

/* ---- Photo capture: read + compress so it can ride along in the JSON payload ---- */
let PHOTO_DATA = null;
document.getElementById('file-input').addEventListener('change', function() {
    const file = this.files[0];
    if (!file) { document.getElementById('file-label').innerText = 'Click to upload a photo'; PHOTO_DATA = null; return; }
    document.getElementById('file-label').innerText = '⏳ Processing photo…';
    compressImage(file, 1280, 0.7).then(b64 => {
        PHOTO_DATA = b64;
        document.getElementById('file-label').innerText = '✓ ' + file.name;
    }).catch(() => {
        // fallback: send the raw data URL if canvas compression isn't supported
        const reader = new FileReader();
        reader.onload = e => { PHOTO_DATA = e.target.result; document.getElementById('file-label').innerText = '✓ ' + file.name; };
        reader.readAsDataURL(file);
    });
});
function compressImage(file, maxDim, quality) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                let w = img.width, h = img.height;
                if (w > maxDim || h > maxDim) {
                    const scale = maxDim / Math.max(w, h);
                    w = Math.round(w * scale); h = Math.round(h * scale);
                }
                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', quality));
            };
            img.onerror = reject;
            img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

/* init */
renderStep1();
calculateTotal();
checkPaidRedirect();
